name: desafio_target
description: "Aplicativo de notas com sincronização em nuvem."
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Dependency injection
  get_it: ^8.0.3

  # Navigation
  go_router: ^15.1.2

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2

  # State management
  mobx: ^2.5.0
  flutter_mobx: ^2.2.1

  # Fonts
  google_fonts: ^6.2.1

  # Others
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # MobX codegen
  build_runner: ^2.4.15
  mobx_codegen: ^2.7.1

flutter:
  uses-material-design: true
